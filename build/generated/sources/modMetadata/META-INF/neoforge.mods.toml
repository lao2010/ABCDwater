[[mods]]
modId="abcdwater"
version="1.0.0"
displayName="ABCDwater"
description='''
ABCDwater - Auto Water Bucket Clutch Mod

Automatically places water when falling to prevent fall damage.
Just keep a water bucket in your hotbar and it will save you automatically!

Features:
- Auto water placement when fall distance exceeds 3 blocks
- Client-side only, works on any server
- Cooldown to prevent wasted buckets
'''

